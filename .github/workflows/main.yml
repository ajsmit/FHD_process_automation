name: CI

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  generated-artifact-hygiene:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Enforce generated artifact hygiene (AD-011)
        run: ./scripts/check-generated-artifacts.sh


      - name: Enforce dashboard size guardrails (AD-012)
        run: ./scripts/check-dashboard-sizes.sh

      - name: Enforce service-boundary guardrails (Post-AD-001)
        run: ./scripts/check-service-boundaries.sh

      - name: Enforce OpenAPI contract sync (AD-019)
        run: ./scripts/check-openapi-contract.sh
